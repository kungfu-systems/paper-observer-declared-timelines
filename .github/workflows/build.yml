name: Build

on:
  workflow_dispatch:
    inputs:
      buildchain-ref:
        description: "Temporary Buildchain runtime ref for trusted manual validation"
        required: false
        default: ""
  pull_request:
  push:
    branches:
      - "dev/**"

permissions:
  contents: read
  issues: write

jobs:
  publication:
    uses: kungfu-systems/buildchain/.github/workflows/publication-artifact.yml@v2
    with:
      buildchain-ref: ${{ inputs['buildchain-ref'] || 'v2-alpha' }}
      buildchain-contract-lock-path: .buildchain/alpha-contract-lock.json
      toolchain-type: config
      verify-command: make check
      artifact-name: paper-observer-declared-timelines
      artifact-paths: |
        _build/main.pdf
        .buildchain/publication/publication-artifact.json
        .buildchain/publication/publication-artifact-passport.json
        .buildchain/publication/publication-registry.json
        .buildchain/publication/source.tar.gz
